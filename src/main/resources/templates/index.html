<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestion des Notes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h1 class="mb-4">Système de Gestion des Notes</h1>
        
        <div class="row">
            <div class="col-md-4 mb-3">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Gestion des Notes</h5>
                        <p class="card-text">CRUD des notes attribuées par les correcteurs</p>
                        <a href="/notes" class="btn btn-primary">Accéder</a>
                    </div>
                </div>
            </div>
            
            <div class="col-md-4 mb-3">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Gestion des Paramètres</h5>
                        <p class="card-text">CRUD des règles de calcul des notes finales</p>
                        <a href="/parametres" class="btn btn-primary">Accéder</a>
                    </div>
                </div>
            </div>
            
            <div class="col-md-4 mb-3">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Calcul de Note Finale</h5>
                        <p class="card-text">Saisir des notes et calculer la note selon les règles</p>
                        <a href="/calcul" class="btn btn-success">Accéder</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
