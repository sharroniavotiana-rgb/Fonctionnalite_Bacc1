<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestion des Paramètres</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h2>Gestion des Paramètres</h2>
        <a href="/" class="btn btn-secondary mb-3">Retour</a>
        
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        
        <!-- Formulaire d'ajout -->
        <div class="card mb-4">
            <div class="card-header">Ajouter un paramètre</div>
            <div class="card-body">
                <form action="/parametres/save" method="post">
                    <div class="mb-3">
                        <label>Matière</label>
                        <select name="matiere.id" class="form-control" required>
                            <option value="">Sélectionner</option>
                            <option th:each="m : ${matieres}" 
                                    th:value="${m.id}" 
                                    th:text="${m.nom}"></option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label>Opérateur</label>
                        <select name="operateur.id" class="form-control" required>
                            <option value="">Sélectionner</option>
                            <option th:each="o : ${operateurs}" 
                                    th:value="${o.id}" 
                                    th:text="${o.symbole}"></option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label>Différence</label>
                        <input type="number" step="0.01" name="difference" class="form-control" required>
                    </div>
                    
                    <div class="mb-3">
                        <label>Résolution</label>
                        <select name="resolution.id" class="form-control" required>
                            <option value="">Sélectionner</option>
                            <option th:each="r : ${resolutions}" 
                                    th:value="${r.id}" 
                                    th:text="${r.nom}"></option>
                        </select>
                    </div>
                    
                    <button
