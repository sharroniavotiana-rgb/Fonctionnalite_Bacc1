<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestion des Notes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h2>Gestion des Notes</h2>
        <a href="/" class="btn btn-secondary mb-3">Retour</a>
        
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        
        <!-- Formulaire d'ajout -->
        <div class="card mb-4">
            <div class="card-header">Ajouter une note</div>
            <div class="card-body">
                <form action="/notes/save" method="post">
                    <div class="mb-3">
                        <label>Candidat</label>
                        <select name="candidat.id" class="form-control" required>
                            <option value="">Sélectionner</option>
                            <option th:each="c : ${candidats}" 
                                    th:value="${c.id}" 
                                    th:text="${c.prenom + ' ' + c.nom}"></option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label>Matière</label>
                        <select name="matiere.id" class="form-control" required>
                            <option value="">Sélectionner</option>
                            <option th:each="m : ${matieres}" 
                                    th:value="${m.id}" 
                                    th:text="${m.nom}"></option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label>Correcteur</label>
                        <select name="correcteur.id" class="form-control" required>
                            <option value="">Sélectionner</option>
                            <option th:each="c : ${correcteurs}" 
                                    th:value="${c.id}" 
                                    th:text="${c.prenom + ' ' + c.nom}"></option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label>Note</label>
                        <input type="number" step="0.01" name="valeur" class="form-control" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">Enregistrer</button>
                </form>
            </div>
        </div>
        
        <!-- Liste des notes -->
        <h3>Liste des notes</h3>
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Candidat</th>
                    <th>Matière</th>
                    <th>Correcteur</th>
                    <th>Note</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="note : ${notes}">
                    <td th:text="${note.id}"></td>
                    <td th:text="${note.candidat.prenom + ' ' + note.candidat.nom}"></td>
                    <td th:text="${note.matiere.nom}"></td>
                    <td th:text="${note.correcteur.prenom + ' ' + note.correcteur.nom}"></td>
                    <td th:text="${note.valeur}"></td>
                    <td>
                        <a th:href="@{/notes/delete/{id}(id=${note.id})}" 
                           class="btn btn-sm btn-danger"
                           onclick="return confirm('Supprimer ?')">Supprimer</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
