<!-- templates/demande/view.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Détails de la Demande - Gestion Devis</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h3>Détails de la Demande</h3>
                    </div>
                    <div class="card-body">
                        <div class="row mb-3">
                            <div class="col-md-3 fw-bold">ID:</div>
                            <div class="col-md-9" th:text="${demande.id}"></div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-3 fw-bold">Date:</div>
                            <div class="col-md-9" th:text="${#temporals.format(demande.date, 'dd/MM/yyyy')}"></div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-3 fw-bold">Lieu:</div>
                            <div class="col-md-9" th:text="${demande.lieu}"></div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-3 fw-bold">District:</div>
                            <div class="col-md-9" th:text="${demande.district}"></div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-3 fw-bold">Client:</div>
                            <div class="col-md-9">
                                <a th:href="@{/clients/view/{id}(id=${demande.clientId})}" 
                                   th:text="${demande.clientNom}"></a>
                            </div>
                        </div>
                        
                        <!-- AFFICHAGE DU STATUT - Version corrigée -->
                        <div class="row mb-3">
                            <div class="col-md-3 fw-bold">Statut:</div>
                            <div class="col-md-9">
                                <span class="badge" 
                                      th:class="${demande.statusLibelle == 'Créé'} ? 'bg-info' : 
                                                (${demande.statusLibelle == 'Validé'} ? 'bg-success' : 
                                                (${demande.statusLibelle == 'Rejeté'} ? 'bg-danger' : 'bg-secondary'))"
                                      style="font-size: 1rem; padding: 8px 15px;">
                                    <span th:text="${demande.statusLibelle != null ? demande.statusLibelle : 'Non défini'}"></span>
                                </span>
                            </div>
                        </div>
                        <!-- FIN AFFICHAGE STATUT -->
                        
                        <div class="d-flex justify-content-between mt-4">
                            <a th:href="@{/demandes}" class="btn btn-secondary">Retour à la liste</a>
                            <div>
                                <a th:href="@{/demandes/edit/{id}(id=${demande.id})}" 
                                   class="btn btn-warning">Modifier</a>
                                <a th:href="@{/clients/view/{id}(id=${demande.clientId})}" 
                                   class="btn btn-info">Voir le client</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
