<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liste des Demandes - Gestion Devis</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>Liste des Demandes</h1>
            <div>
                <a th:href="@{/demandes/new}" class="btn btn-primary">Nouvelle Demande</a>
                <a th:href="@{/clients}" class="btn btn-secondary">Voir Clients</a>
            </div>
        </div>
        
        <!-- Formulaire de recherche -->
        <div class="card mb-4">
            <div class="card-body">
                <form th:action="@{/demandes/search}" method="get" class="row g-3">
                    <div class="col-md-10">
                        <input type="text" name="lieu" class="form-control" 
                               placeholder="Rechercher par lieu..." th:value="${searchLieu}">
                    </div>
                    <div class="col-md-2">
                        <button type="submit" class="btn btn-outline-primary w-100">Rechercher</button>
                    </div>
                </form>
            </div>
        </div>
        
        <!-- Messages d'alerte -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        
        <!-- Tableau des demandes -->
        <div class="table-responsive">
            <table class="table table-striped table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Date</th>
                        <th>Lieu</th>
                        <th>District</th>
                        <th>Client</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="demande : ${demandes}">
                        <td th:text="${demande.id}">1</td>
                        <td th:text="${#temporals.format(demande.date, 'dd/MM/yyyy')}">01/01/2024</td>
                        <td th:text="${demande.lieu}">Lieu</td>
                        <td th:text="${demande.district}">District</td>
                        <td th:text="${demande.clientNom}">Client</td>
                        <td>
                            <a th:href="@{/demandes/view/{id}(id=${demande.id})}" 
                               class="btn btn-sm btn-info">Voir</a>
                            <a th:href="@{/demandes/edit/{id}(id=${demande.id})}" 
                               class="btn btn-sm btn-warning">Modifier</a>
                            <a th:href="@{/demandes/delete/{id}(id=${demande.id})}" 
                               class="btn btn-sm btn-danger"
                               onclick="return confirm('Êtes-vous sûr de vouloir supprimer cette demande ?')">Supprimer</a>
                        </td>
                    </tr>
                    <tr th:if="${demandes.empty}">
                        <td colspan="6" class="text-center">Aucune demande trouvée</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
