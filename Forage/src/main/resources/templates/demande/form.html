<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:if="${demande.id == null}">Nouvelle Demande - Gestion Devis</title>
    <title th:if="${demande.id != null}">Modifier Demande - Gestion Devis</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header">
                        <h3 th:if="${demande.id == null}">Créer une nouvelle demande</h3>
                        <h3 th:if="${demande.id != null}">Modifier la demande</h3>
                    </div>
                    <div class="card-body">
                        <form th:action="${demande.id == null} ? @{/demandes/save} : @{/demandes/update/{id}(id=${demande.id})}" 
                              th:object="${demande}" method="post">
                            
                            <div class="mb-3">
                                <label for="date" class="form-label">Date *</label>
                                <input type="date" class="form-control" id="date" 
                                       th:field="*{date}" 
                                       th:classappend="${#fields.hasErrors('date')} ? 'is-invalid' : ''">
                                <div class="invalid-feedback" th:errors="*{date}"></div>
                            </div>
                            
                            <div class="mb-3">
                                <label for="lieu" class="form-label">Lieu *</label>
                                <input type="text" class="form-control" id="lieu" 
                                       th:field="*{lieu}" 
                                       th:classappend="${#fields.hasErrors('lieu')} ? 'is-invalid' : ''">
                                <div class="invalid-feedback" th:errors="*{lieu}"></div>
                            </div>
                            
                            <div class="mb-3">
                                <label for="district" class="form-label">District *</label>
                                <input type="text" class="form-control" id="district" 
                                       th:field="*{district}" 
                                       th:classappend="${#fields.hasErrors('district')} ? 'is-invalid' : ''">
                                <div class="invalid-feedback" th:errors="*{district}"></div>
                            </div>
                            
                            <div class="mb-3">
                                <label for="clientId" class="form-label">Client *</label>
                                <select class="form-control" id="clientId" 
                                        th:field="*{clientId}"
                                        th:classappend="${#fields.hasErrors('clientId')} ? 'is-invalid' : ''">
                                    <option value="">Sélectionner un client</option>
                                    <option th:each="client : ${clients}" 
                                            th:value="${client.id}" 
                                            th:text="${client.nom}"></option>
                                </select>
                                <div class="invalid-feedback" th:errors="*{clientId}"></div>
                            </div>
                            
                            <div class="d-flex justify-content-between">
                                <a th:href="@{/demandes}" class="btn btn-secondary">Annuler</a>
                                <button type="submit" class="btn btn-primary">
                                    <span th:if="${demande.id == null}">Créer</span>
                                    <span th:if="${demande.id != null}">Mettre à jour</span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
