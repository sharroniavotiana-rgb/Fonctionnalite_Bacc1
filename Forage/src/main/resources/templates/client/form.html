<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:if="${client.id == null}">Nouveau Client - Gestion Devis</title>
    <title th:if="${client.id != null}">Modifier Client - Gestion Devis</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h3 th:if="${client.id == null}">Créer un nouveau client</h3>
                        <h3 th:if="${client.id != null}">Modifier le client</h3>
                    </div>
                    <div class="card-body">
                        <form th:action="${client.id == null} ? @{/clients/save} : @{/clients/update/{id}(id=${client.id})}" 
                              th:object="${client}" method="post">
                            
                            <div class="mb-3">
                                <label for="nom" class="form-label">Nom *</label>
                                <input type="text" class="form-control" id="nom" 
                                       th:field="*{nom}" 
                                       th:classappend="${#fields.hasErrors('nom')} ? 'is-invalid' : ''">
                                <div class="invalid-feedback" th:errors="*{nom}"></div>
                            </div>
                            
                            <div class="mb-3">
                                <label for="contact" class="form-label">Contact *</label>
                                <input type="text" class="form-control" id="contact" 
                                       th:field="*{contact}"
                                       th:classappend="${#fields.hasErrors('contact')} ? 'is-invalid' : ''">
                                <div class="invalid-feedback" th:errors="*{contact}"></div>
                            </div>
                            
                            <div class="d-flex justify-content-between">
                                <a th:href="@{/clients}" class="btn btn-secondary">Annuler</a>
                                <button type="submit" class="btn btn-primary">
                                    <span th:if="${client.id == null}">Créer</span>
                                    <span th:if="${client.id != null}">Mettre à jour</span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
