<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Détails du Client - Gestion Devis</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header">
                        <h3>Détails du Client</h3>
                    </div>
                    <div class="card-body">
                        <div class="row mb-3">
                            <div class="col-md-3 fw-bold">ID:</div>
                            <div class="col-md-9" th:text="${client.id}"></div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-3 fw-bold">Nom:</div>
                            <div class="col-md-9" th:text="${client.nom}"></div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-3 fw-bold">Contact:</div>
                            <div class="col-md-9" th:text="${client.contact}"></div>
                        </div>
                        <div class="d-flex justify-content-between">
                            <a th:href="@{/clients}" class="btn btn-secondary">Retour à la liste</a>
                            <div>
                                <a th:href="@{/clients/edit/{id}(id=${client.id})}" 
                                   class="btn btn-warning">Modifier</a>
                                <a th:href="@{/demandes/client/{clientId}(clientId=${client.id})}" 
                                   class="btn btn-info">Voir ses demandes</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
